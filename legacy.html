<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>一术专用提示词</title>
    <style>
        :root {
            --bg-color: #09090b;
            --card-bg: #18181b;
            --header-bg: rgba(9, 9, 11, 0.85);
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --success-color: #10b981;
            --border-color: #27272a;
            --input-bg: #09090b;
            --radius-lg: 16px;
            --radius-md: 10px;
            --radius-sm: 6px;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            width: 95%;
            margin: 0 auto;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }

        header {
            width: 100%;
            background-color: var(--header-bg);
            backdrop-filter: blur(12px);
            padding: 12px 32px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            z-index: 100;
            flex-shrink: 0;
        }

        .header-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            text-align: center;
            min-width: 0;
            max-width: 100%;
        }

        .header-center-row1 {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px 18px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            font-size: 1.65rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .logo img {
            height: 36px;
            object-fit: contain;
        }

        .nav-block { margin-bottom: 20px; }
        .group-nav-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 14px;
        }
        .group-tab {
            flex: 1;
            min-width: 140px;
            padding: 14px 20px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .group-tab.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: #fff;
        }
        .preset-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .preset-pill {
            padding: 8px 16px;
            border-radius: 999px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-muted);
            font-size: 0.88rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .preset-pill.active {
            background: linear-gradient(90deg, #f472b6, #fb923c);
            border-color: transparent;
            color: #0c0c0e;
            font-weight: 600;
        }

        .header-center-row2 {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px 24px;
        }

        .sponsor-banner {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 18px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 100px;
            color: var(--primary-color);
            text-decoration: none;
            font-size: 1.125rem;
            font-weight: 600;
            transition: 0.2s;
        }
        .sponsor-banner img { height: 21px; }

        .wechat-box {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.125rem;
            color: var(--text-muted);
        }
        .wechat-box .copy-btn {
            font-size: 1.05rem;
            padding: 8px 15px;
        }

        @media (max-width: 720px) {
            header {
                padding: 12px 16px;
                padding-left: max(16px, env(safe-area-inset-left));
                padding-right: max(16px, env(safe-area-inset-right));
            }
            .logo { font-size: 1.5rem; }
            .logo img { height: 33px; }
            .sponsor-banner { font-size: 1.05rem; padding: 5px 14px; }
            .sponsor-banner img { height: 19px; }
            .wechat-box { font-size: 1.05rem; }
            .wechat-box .copy-btn { font-size: 0.98rem; padding: 7px 12px; }
            .group-tab { min-width: 100px; padding: 10px 12px; font-size: 0.85rem; }
            .preset-pill { padding: 6px 12px; font-size: 0.8rem; }
        }

        main {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0;
            padding: 24px 40px;
            padding-bottom: max(24px, env(safe-area-inset-bottom));
            gap: 40px;
            box-sizing: border-box;
        }

        #left-panel { flex: 1; overflow-y: auto; padding-right: 10px; min-height: 0; -webkit-overflow-scrolling: touch; }

        .section-title { font-size: 1.1rem; font-weight: 600; margin: 32px 0 20px 0; display: flex; align-items: center; gap: 10px; }
        .section-title:first-child { margin-top: 0; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 20px;
            align-items: stretch;
        }

        @media (max-width: 1500px) {
            .grid-container { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        }
        @media (max-width: 1100px) {
            .grid-container { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }
        @media (max-width: 640px) {
            .grid-container { grid-template-columns: minmax(0, 1fr); }
        }

        @media (max-width: 900px) {
            body {
                padding-top: env(safe-area-inset-top);
            }
            main {
                flex-direction: column;
                flex: 1;
                min-height: 0;
                overflow-y: auto;
                overflow-x: hidden;
                -webkit-overflow-scrolling: touch;
                padding: 12px 16px;
                padding-bottom: max(16px, env(safe-area-inset-bottom));
                padding-left: max(16px, env(safe-area-inset-left));
                padding-right: max(16px, env(safe-area-inset-right));
                gap: 16px;
            }
            #left-panel {
                flex: 0 0 auto;
                padding-right: 0;
                overflow: visible;
            }
            #right-panel {
                width: 100%;
                flex: 0 0 auto;
                margin-top: 0;
                max-height: none;
                min-height: 0;
                border-radius: var(--radius-lg);
            }
            .preview-header {
                padding: 12px 14px;
                gap: 8px;
            }
            #preview-content {
                flex: none;
                min-height: 120px;
                max-height: min(55vh, 480px);
                overflow-y: auto;
                padding: 12px 14px;
            }
            .preview-top-row {
                flex-wrap: wrap;
                gap: 8px;
                align-items: flex-start;
            }
            .copy-btn {
                padding: 8px 12px;
                font-size: 0.75rem;
                min-height: 36px;
            }
        }

        .card {
            background-color: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            border: 1px solid var(--border-color);
            transition: 0.2s;
            min-height: 0;
            height: 100%;
            box-sizing: border-box;
        }
        .card:hover { border-color: #3f3f46; }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .card-title-group { display: flex; flex-direction: column; gap: 6px; }
        .card-label { font-size: 0.95rem; font-weight: 600; }
        .card-description { font-size: 0.78rem; color: var(--text-muted); line-height: 1.45; margin: 0; max-width: 100%; }

        .selected-value { font-size: 0.75rem; color: var(--primary-color); background: rgba(59, 130, 246, 0.12); padding: 3px 10px; border-radius: 100px; font-weight: 500; }
        .selected-value.empty { color: var(--text-muted); background: rgba(255, 255, 255, 0.05); }

        select, input[type="text"], textarea { background-color: var(--input-bg); color: var(--text-main); border: 1px solid var(--border-color); padding: 10px 14px; border-radius: var(--radius-md); font-size: 0.9rem; width: 100%; box-sizing: border-box; outline: none; font-family: inherit; }
        textarea.custom-input { resize: none; overflow: hidden; min-height: 38px; line-height: 1.5; }

        .pill-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .pill-label {
            position: relative;
            display: inline-flex;
            align-items: center;
            cursor: pointer;
        }
        .pill-label input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            position: absolute;
            width: 0;
            height: 0;
            opacity: 0;
            margin: 0;
            padding: 0;
            border: 0;
            pointer-events: none;
        }
        .pill-text { display: inline-block; background-color: var(--input-bg); color: var(--text-muted); padding: 6px 12px; border-radius: 100px; font-size: 0.8rem; cursor: pointer; border: 1px solid var(--border-color); }
        .pill-label input:checked + .pill-text { background-color: rgba(59, 130, 246, 0.15); color: var(--primary-color); border-color: var(--primary-color); }

        .pill-group-single .pill-label input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            position: absolute;
            width: 0;
            height: 0;
            opacity: 0;
            margin: 0;
            padding: 0;
            border: 0;
            pointer-events: none;
        }
        .pill-group-single .pill-label input:checked + .pill-text {
            background-color: rgba(168, 85, 247, 0.18);
            color: #d8b4fe;
            border-color: #a855f7;
        }

        #right-panel { width: 340px; flex-shrink: 0; display: flex; flex-direction: column; background-color: var(--card-bg); border-radius: var(--radius-lg); border: 1px solid var(--border-color); }
        .preview-header { padding: 16px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: flex-start; flex-direction: column; gap: 10px; }
        .preview-top-row { display: flex; width: 100%; justify-content: space-between; align-items: center; }
        .preview-title { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); letter-spacing: 1px; }

        .copy-btn { background: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid var(--border-color); padding: 5px 10px; border-radius: var(--radius-sm); cursor: pointer; font-size: 0.7rem; transition: 0.2s; }
        .wechat-btn { background: rgba(16, 185, 129, 0.1); color: var(--success-color); border: 1px solid rgba(16, 185, 129, 0.2); }
        .doubao-btn-open { background: #ff7f27; color: #fff; border: 1px solid #ff7f27; }
        .doubao-btn-open:hover { background: #e66f1f; border-color: #e66f1f; }
        .doubao-btn-copy { background: #333; color: #fff; border: 1px solid #444; }
        .doubao-btn-copy:hover { background: #444; border-color: #555; }

        #preview-content { flex: 1; padding: 20px; overflow-y: auto; background: #0c0c0e; min-height: 0; }
        pre { margin: 0; font-family: "Menlo", monospace; font-size: 0.75rem; color: #a6accd; line-height: 1.5; white-space: pre-wrap; }

        .panel-wechat {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px 10px;
            width: 100%;
            margin-top: 8px;
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
        }
        .panel-wechat .wechat-box {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .panel-wechat .copy-btn {
            font-size: 0.75rem;
            padding: 6px 12px;
        }

        .weather-bar {
            display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;
        }
        .weather-btn {
            padding: 9px 18px; border-radius: 50px; border: 1px solid var(--border-color);
            background: var(--card-bg); color: var(--text-main); font-size: 0.92rem; cursor: pointer; transition: 0.2s;
        }
        .weather-btn.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }
        .weather-btn.custom.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }

        .hidden-adder { display: none; gap: 8px; margin-top: 8px; }
        .hidden-adder.active { display: flex; align-items: flex-start; }

        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #27272a; transition: .3s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: #a1a1aa; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary-color); }
        input:checked + .slider:before { transform: translateX(20px); background-color: white; }
    </style>
</head>
<body>
    <header>
        <div class="header-center">
            <div class="header-center-row1">
                <div class="logo">
                    <span style="font-weight: bold;
  background: -webkit-linear-gradient(left, #FFF16A, #FF4066);background-clip: text;color: transparent;">一术专用提示词</span>
                </div>
            </div>

            <div style="font-size: 28px;
  font-weight: bold;
  background: -webkit-linear-gradient(left, #FFF16A, #FF4066);background-clip: text;color: transparent;">小白零门槛，一键搞定提示词!</div>
            <div style="font-size:.85rem;color:var(--text-muted)">
                适配 Nanobanana / GPT-image2 · 覆盖 室内 / 建筑 / 景观 三大领域</div>
        </div>
    </header>

    <main>
        <div id="left-panel">
            <div class="nav-block">
                <div class="group-nav-bar" id="groupNavBar"></div>
                <div class="preset-bar" id="presetNavBar"></div>
            </div>
            <div class="weather-bar" id="weatherBar"></div>
            <div id="form-container">
                <div id="message-box" style="text-align: center; padding: 40px; color: var(--text-muted);">正在加载配置...</div>
            </div>
        </div>

        <div id="right-panel">
            <span class="preview-title" style="font-size: 20px;text-align: center;margin: 10px 0;">JSON 提示词</span>
            <div id="preview-content">
                <pre id="json-preview">{}</pre>

            <div class="preview-header" style="border-top: 1px solid var(--border-color); margin-top: 0;">
                <div class="preview-top-row">
                    <div style="display: flex; gap: 6px; margin: 0 auto; flex-wrap: wrap; justify-content: center;">
                        <button type="button" class="copy-btn" onclick="copyJson(this)">复制JSON</button>
                        <button type="button" class="copy-btn doubao-btn-open" onclick="openDoubao()">跳转豆包</button>
                        <button type="button" class="copy-btn doubao-btn-copy" onclick="copyAndOpenDoubao(this)">复制跳转</button>

                </div>
                <div class="panel-wechat">
                    <div class="wechat-box">

                    </div>
                    <button type="button" class="copy-btn wechat-btn" onclick="copyWeChat(this)">复制</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { state, changeGroup, changePreset, changeProject, patchState, onStateChange } from './appState.js';
        import { registerConfig, getCurrentSchema, getCurrentPreset, getPresetsForGroup, getGroups, getGroupMeta } from './configLoader.js';

        const WECHAT_ID = "一术";

        registerConfig('xiangjiao', configData);

        // ─── 渲染函数（读取 appState）───────────────────

        function renderWeatherBar() {
            const bar = document.getElementById('weatherBar');
            if (!bar) return;
            const meta = getGroupMeta();
            if (!meta?.hasWeather) { bar.innerHTML = ''; return; }
            bar.innerHTML = Object.keys(weatherConfig).map(key => {
                const w = weatherConfig[key];
                const active = key === currentWeather ? ' active' : '';
                return `<button type="button" class="weather-btn${active}" data-weather="${key}">${w.icon} ${w.name}</button>`;
            }).join('');
            bar.querySelectorAll('.weather-btn').forEach(btn => {
                btn.onclick = () => {
                    currentWeather = btn.dataset.weather;
                    renderWeatherBar();
                    updatePreview();
                };
            });
        }

        function renderGroupNav() {
            const bar = document.getElementById('groupNavBar');
            if (!bar) return;
            const gks = getGroups();
            bar.innerHTML = gks.map(gk => {
                const meta = getGroupMeta(gk);
                const active = gk === state.group ? ' active' : '';
                return `<button type="button" class="group-tab${active}" data-group="${escapeAttr(gk)}">${escapeHtml(meta.icon || '')} ${escapeHtml(meta.name || gk)}</button>`;
            }).join('');
            bar.querySelectorAll('.group-tab').forEach(btn => {
                btn.onclick = () => {
                    const gk = btn.dataset.group;
                    changeGroup(gk); // 自动同步 URL + 触发 onStateChange
                };
            });
        }

        function renderPresetNav() {
            const bar = document.getElementById('presetNavBar');
            if (!bar) return;
            const presets = getPresetsForGroup();
            if (!presets.length) {
                bar.innerHTML = '<span style="color:var(--text-muted);font-size:0.85rem">该组暂无默认配置</span>';
                return;
            }
            bar.innerHTML = presets.map(p => {
                const active = p.key === state.preset ? ' active' : '';
                return `<button type="button" class="preset-pill${active}" data-preset="${escapeAttr(p.key)}">${escapeHtml(p.name || p.key)}</button>`;
            }).join('');
            bar.querySelectorAll('.preset-pill').forEach(btn => {
                btn.onclick = () => {
                    changePreset(btn.dataset.preset); // 自动同步 URL + 触发 onStateChange
                };
            });
        }

        function applyGroupSchema() {
            const sections = getCurrentSchema();
            if (!Object.keys(sections).length) {
                document.getElementById('form-container').innerHTML =
                    '<div style="text-align:center;padding:40px;color:var(--text-muted)">该组暂无配置</div>';
                formSchema = null;
                currentData = {};
                updatePreview();
                return;
            }
            buildForm(sections);
        }

        // ─── 全量刷新（状态变化时调用）──────────────────
        function fullRefresh() {
            renderGroupNav();
            renderPresetNav();
            renderWeatherBar();
            applyGroupSchema();
        }

        // ─── 监听 URL 状态变化（含浏览器前进/后退）──────
        onStateChange((newState, changedKey) => {
            console.log('[state changed]', changedKey, newState);
            fullRefresh();

        document.querySelectorAll('.wechat-val').forEach(el => el.textContent = WECHAT_ID);
        fullRefresh();

        function escapeAttr(s) { return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;'); }
        function escapeJsSq(s) {
            return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\r/g, '\\r').replace(/\n/g, '\\n');
        }
        function escapeHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
        function looksLikeJsonObject(str) {
            const s = String(str).trim();
            return s.startsWith('{') && s.endsWith('}');
        }
        function parseCompleteJson(str) {
            if (!looksLikeJsonObject(str)) return null;
            try {
                const v = JSON.parse(String(str).trim());
                return v !== null && typeof v === 'object' && !Array.isArray(v) ? v : null;
            } catch (e) {
                return null;
            }
        }
        function resolveFieldValueForPreview(val) {
            if (typeof val === 'string') {
                const parsed = parseCompleteJson(val);
                if (parsed !== null) return parsed;
            }
            return val;
        }
        function normOptionItem(raw) {
            if (typeof raw === 'string') return { value: raw, label: raw };
            if (typeof raw === 'object') return { value: String(raw.value), label: String(raw.label) };
            return null;
        }
        function getFieldByKey(fieldKey) {
            if (!formSchema) return null;
            for (const sk of Object.keys(formSchema)) {
                const sec = formSchema[sk];
                if (sec.fields && sec.fields[fieldKey]) return sec.fields[fieldKey];
            }
            return null;
        }
        function flatOptionValues(field) {
            if (field.group && field.options && typeof field.options === 'object') {
                const out = [];
                for (const g in field.options) {
                    field.options[g].forEach(item => {
                        const n = normOptionItem(item);
                        if (n) out.push(n.value);
                    });
                }
                return out;
            }
            return (field.options || []).map(i => normOptionItem(i)?.value).filter(Boolean);
        }
        function labelForOptionValue(field, v) {
            if (!field || !field.options) return v;
            const list = Array.isArray(field.options) ? field.options : Object.values(field.options).flat();
            const item = list.find(i => normOptionItem(i).value === v);
            return item ? normOptionItem(item).label : v;
        }
        function schemaDefaultValue(field) {
            if (field.type === 'switch' || field.type === 'boolean') return !!field.default;
            if (field.type === 'multi-select') return Array.isArray(field.default) ? [...field.default] : [];
            if (field.type === 'select' || field.type === 'button-select') {
                const opts = flatOptionValues(field);
                return opts.includes(field.default) ? field.default : (opts[0] || '');
            }
            if (field.type === 'text') return String(field.default || '');
            return '';
        }

        function pickInitialValue(field) {
            return schemaDefaultValue(field);
        }
        function valTagText(field, v) {
            if (field.type === 'switch') return v ? '开' : '关';
            if (field.type === 'multi-select') {
                return v.map(x => {
                    if (typeof x === 'string' && parseCompleteJson(x) !== null) return 'JSON 对象';
                    return labelForOptionValue(field, x);
                }).join(' · ') || '未选';
            }
            if (field.type === 'select' || field.type === 'button-select') {
                if (typeof v === 'string' && parseCompleteJson(v) !== null) return 'JSON 对象';
                return labelForOptionValue(field, v) || '未选';
            }
            if (typeof v === 'string' && parseCompleteJson(v) !== null) return 'JSON 对象';
            return v || '未填';
        }

        function buildForm(schema) {
            const container = document.getElementById('form-container');
            container.innerHTML = '';
            currentData = {};
            formSchema = schema;

            for (const sectionKey in schema) {
                const section = schema[sectionKey];
                const sectionDiv = document.createElement('div');
                sectionDiv.innerHTML = `<div class="section-title"><span>${section.icon || '📌'}</span> ${escapeHtml(section.title)}</div>`;

                const grid = document.createElement('div');
                grid.className = 'grid-container';

                for (const fieldKey in section.fields) {
                    const field = section.fields[fieldKey];
                    const card = document.createElement('div');
                    card.className = 'card';
                    const initialVal = pickInitialValue(field, fieldKey);
                    currentData[fieldKey] = initialVal;
                    const tagShow = valTagText(field, initialVal);
                    const tagClass = (initialVal === false || (Array.isArray(initialVal) && initialVal.length === 0) || initialVal === '')
                        ? 'selected-value empty' : 'selected-value';

                    let content = `
                    <div class="card-header">
                        <div class="card-title-group">
                            <span class="card-label">${escapeHtml(field.label)}</span>
                            ${field.description ? `<p class="card-description">${escapeHtml(field.description)}</p>` : ''}
                            <span id="val-${fieldKey}" class="${tagClass}">${tagShow}</span>
                        </div>`;

                    if (field.type === 'switch') {
                        content += `<label class="switch"><input type="checkbox" ${initialVal ? 'checked' : ''} onchange="updateData('${fieldKey}',this.checked)"><span class="slider"></span></label>`;
                    } else {
                        content += `</div><div>`;
                        if (field.type === 'text') {
                            content += `<input type="text" value="${escapeAttr(initialVal)}" oninput="updateData('${fieldKey}',this.value)">`;
                        } else if (field.type === 'select') {
                            content += `<select id="select-${fieldKey}" onchange="handleSelectChange('${fieldKey}',this.value)">`;
                            if (field.group) {
                                for (const g in field.options) {
                                    content += `<optgroup label="${escapeAttr(g)}">`;
                                    (field.options[g] || []).forEach(opt => {
                                        const n = normOptionItem(opt);
                                        content += `<option value="${escapeAttr(n.value)}" ${n.value === initialVal ? 'selected' : ''}>${escapeHtml(n.label)}</option>`;
                                    });
                                    content += `</optgroup>`;
                                }
                            } else {
                                (field.options || []).forEach(opt => {
                                    const n = normOptionItem(opt);
                                    content += `<option value="${escapeAttr(n.value)}" ${n.value === initialVal ? 'selected' : ''}>${escapeHtml(n.label)}</option>`;
                                });
                            }
                            content += `<option value="__ADD_NEW__">➕ 自定义</option></select>`;
                        } else if (field.type === 'multi-select') {
                            content += `<div class="pill-group" id="pills-${fieldKey}">`;
                            (field.options || []).forEach(opt => {
                                const n = normOptionItem(opt);
                                const checked = initialVal.includes(n.value) ? 'checked' : '';
                                content += `<label class="pill-label"><input type="checkbox" value="${escapeAttr(n.value)}" ${checked} onchange="updateMultiData('${fieldKey}',this.value,this.checked)"><span class="pill-text">${escapeHtml(n.label)}</span></label>`;
                            });
                            content += `<div class="pill-text" style="border-style:dashed" onclick="toggleAdder('${fieldKey}')">+ 自定义</div></div>`;
                        } else if (field.type === 'button-select') {
                            const name = `radio-${fieldKey}`;
                            content += `<div class="pill-group pill-group-single" id="pills-${fieldKey}">`;
                            (field.options || []).forEach(opt => {
                                const n = normOptionItem(opt);
                                const checked = n.value === initialVal ? 'checked' : '';
                                content += `<label class="pill-label"><input type="radio" name="${name}" value="${escapeAttr(n.value)}" ${checked} onchange="updateData('${fieldKey}',this.value)"><span class="pill-text">${escapeHtml(n.label)}</span></label>`;
                            });
                            content += `<div class="pill-text" style="border-style:dashed" onclick="toggleAdder('${fieldKey}')">+ 自定义</div></div>`;
                        }
                        content += `<div id="adder-${fieldKey}" class="hidden-adder"><textarea class="custom-input" id="input-${fieldKey}" rows="1" placeholder="输入新值（支持 JSON 对象）" oninput="autoResizeTextarea(this); handleCustomInput('${fieldKey}')"></textarea><button class="copy-btn" style="background:var(--primary-color);flex-shrink:0" onclick="saveCustomItem('${fieldKey}','${field.type}')">确定</button></div></div>`;
                    }
                    card.innerHTML = content;
                    grid.appendChild(card);
                }
                sectionDiv.appendChild(grid);
                container.appendChild(sectionDiv);
            }
            updatePreview();
        }

        function updateData(key, val) {
            currentData[key] = val;
            const tag = document.getElementById('val-' + key);
            const field = getFieldByKey(key);
            tag.textContent = valTagText(field, val);
            tag.classList.toggle('empty', val === false || val === '');
            updatePreview();
        }

        function updateMultiData(key, val, checked) {
            if (checked) currentData[key].push(val);
            else currentData[key] = currentData[key].filter(x => x !== val);
            const tag = document.getElementById('val-' + key);
            const field = getFieldByKey(key);
            tag.textContent = currentData[key].length ? currentData[key].map(x => labelForOptionValue(field,x)).join(' · ') : '未选';
            tag.classList.toggle('empty', !currentData[key].length);
            updatePreview();
        }

        function splitBoolFieldKeyToJsonPair(fk) {
            const i = Math.max(fk.indexOf(':'), fk.indexOf('：'));
            if (i < 0) return null;
            return { jsonKey: fk.slice(0,i).trim(), jsonVal: fk.slice(i+1).trim() };
        }

        function buildNestedPreviewForDisplay() {
            const nested = {};
            const meta = getGroupMeta();
            if (meta?.hasWeather) {
                nested["天气氛围"] = weatherConfig[currentWeather]?.prompt || '';
            }
            if (formSchema) {
                for (const sk in formSchema) {
                    nested[sk] = {};
                    const fields = formSchema[sk].fields;
                    for (const fk in fields) {
                        const field = fields[fk];
                        const val = currentData[fk];
                        if (field.type === 'switch') {
                            if (!val) continue;
                            const p = splitBoolFieldKeyToJsonPair(fk);
                            if (p) nested[sk][p.jsonKey] = p.jsonVal;
                            else nested[sk][fk] = true;
                        } else {
                            nested[sk][fk] = resolveFieldValueForPreview(val);
                        }
                    }
                }
            }
            return nested;
        }

        function updatePreview() {
            const out = buildNestedPreviewForDisplay();
            document.getElementById('json-preview').textContent = JSON.stringify(out, null, 4);
        }

        function autoResizeTextarea(ta) {
            if (!ta) return;
            ta.style.height = 'auto';
            ta.style.height = Math.max(ta.scrollHeight, 38) + 'px';
        }
        function handleCustomInput(key) {
            updatePreview();
        }
        function handleSelectChange(key, val) {
            if (val === '__ADD_NEW__') {
                document.getElementById('adder-' + key).classList.add('active');
                const ta = document.getElementById('input-' + key);
                requestAnimationFrame(() => autoResizeTextarea(ta));
            } else {
                document.getElementById('adder-' + key).classList.remove('active');
                updateData(key, val);
            }
        }
        function toggleAdder(key) {
            const adder = document.getElementById('adder-' + key);
            adder.classList.toggle('active');
            if (adder.classList.contains('active')) {
                const ta = document.getElementById('input-' + key);
                requestAnimationFrame(() => autoResizeTextarea(ta));
            }
        }
        function saveCustomItem(key, type) {
            const ta = document.getElementById('input-' + key);
            const v = ta.value.trim();
            if (!v) return;
            if (type === 'select') {
                const sel = document.getElementById('select-' + key);
                sel.add(new Option(v, v), sel.options[sel.options.length - 1]);
                sel.value = v;
                updateData(key, v);
            } else if (type === 'button-select') {
                const pg = document.getElementById('pills-' + key);
                const name = pg.querySelector('input[type="radio"]').name;
                const label = document.createElement('label');
                label.className = 'pill-label';
                label.innerHTML = `<input type="radio" name="${name}" value="${escapeAttr(v)}" checked onchange="updateData('${key}',this.value)"><span class="pill-text">${escapeHtml(v)}</span>`;
                pg.insertBefore(label, pg.lastElementChild);
                updateData(key, v);
            } else {
                const pg = document.getElementById('pills-' + key);
                const label = document.createElement('label');
                label.className = 'pill-label';
                label.innerHTML = `<input type="checkbox" value="${escapeAttr(v)}" checked onchange="updateMultiData('${key}',this.value,this.checked)"><span class="pill-text">${escapeHtml(v)}</span>`;
                pg.insertBefore(label, pg.lastElementChild);
                updateMultiData(key, v, true);
            }
            ta.value = '';
            autoResizeTextarea(ta);
            document.getElementById('adder-' + key).classList.remove('active');
        }

        async function copyTextToClipboard(text) {
            if (navigator.clipboard) {
                try { await navigator.clipboard.writeText(text); return; } catch(e) {}
            }
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
        }
        async function feedback(btn, txt) {
            const old = btn.textContent;
            btn.textContent = txt;
            btn.disabled = true;
            setTimeout(() => { btn.textContent = old; btn.disabled = false; }, 2000);
        }
        async function copyJson(btn) {
            try {
                await copyTextToClipboard(document.getElementById('json-preview').textContent);
                await feedback(btn, '✅ 已复制');
            } catch(e) { alert('复制失败'); }
        }
        function openDoubao() {
            window.open(DOUBAO_URL, '_blank', 'noopener,noreferrer');
        }
        async function copyAndOpenDoubao(btn) {
            try {
                await copyTextToClipboard(document.getElementById('json-preview').textContent);
                openDoubao();
                await feedback(btn, '✅ 已复制');
            } catch(e) { alert('复制失败'); }
        }
        async function copyWeChat(btn) {
            try { await copyTextToClipboard(WECHAT_ID); await feedback(btn, '✅ 已复制'); }
            catch(e) { alert('复制失败'); }
        }
    </script>
</body>
</html>
