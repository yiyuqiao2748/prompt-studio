<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProPrompt - AI 提示词生成器</title>
    <style>
        :root {
            --bg: #09090b;
            --card-bg: #121214;
            --input-bg: #1a1a1e;
            --border-color: #27272a;
            --text-main: #e4e4e7;
            --text-muted: #71717a;
            --primary-color: #3b82f6;
            --success-color: #10b981;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding-top: env(safe-area-inset-top);
        }
        header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            flex-shrink: 0;
        }
        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(90deg, #FFF16A, #FF4066);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }
        .subtitle {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .weather-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }
        .weather-btn {
            padding: 6px 16px;
            border-radius: 100px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        .weather-btn.active {
            background: rgba(59, 130, 246, 0.15);
            color: var(--primary-color);
            border-color: var(--primary-color);
        }
        .weather-btn:hover { border-color: #52525b; }
        .weather-btn.custom { border-style: dashed; }
        main {
            display: flex;
            flex: 1;
            gap: 20px;
            padding: 16px 20px;
            overflow: hidden;
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
            align-items: stretch;
            min-height: calc(100vh - 120px);
        }
        #left-panel {
            flex: 1;
            padding-right: 8px;
            overflow-y: auto;
            min-height: 0;
            max-height: calc(100vh - 140px);
        }
        #right-panel {
            width: 340px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            min-height: 0;
            max-height: calc(100vh - 140px);
        }
        .panel-wechat {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding-top: 8px;
            margin-top: 8px;
            border-top: 1px solid var(--border-color);
        }
        .panel-wechat span {
            font-size: 0.78rem;
            color: var(--text-muted);
        }
        .tab-bar {
            display: flex;
            gap: 4px;
            background: var(--card-bg);
            padding: 4px;
            border-radius: var(--radius-md);
            margin-bottom: 16px;
            overflow-x: auto;
            flex-shrink: 0;
        }
        .tab-btn {
            padding: 8px 14px;
            font-size: 0.82rem;
            border: none;
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .tab-btn.active { background: var(--primary-color); color: #fff; }
        .tab-btn:hover { color: var(--text-main); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 28px;
        }
        @media (max-width: 750px) { .grid-container { grid-template-columns: minmax(0, 1fr); } }
        @media (max-width: 900px) {
            main { flex-direction: column; padding: 12px 16px; gap: 16px; }
            #left-panel { flex: 0 0 auto; overflow: visible; padding-right: 0; }
            #right-panel { width: 100%; max-height: none; min-height: 0; }
        }
        .card {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid var(--border-color);
            transition: 0.2s;
        }
        .card:hover { border-color: #3f3f46; }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .card-title-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .card-label { font-size: 0.88rem; font-weight: 600; }
        .card-description { font-size: 0.73rem; color: var(--text-muted); line-height: 1.4; }
        .selected-value { font-size: 0.7rem; padding: 2px 8px; border-radius: 100px; font-weight: 500; color: var(--primary-color); background: rgba(59, 130, 246, 0.12); }
        .selected-value.empty { color: var(--text-muted); background: rgba(255,255,255,0.05); }
        select, input[type="text"] {
            background: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            width: 100%;
            outline: none;
        }
        select:focus, input[type="text"]:focus { border-color: var(--primary-color); }
        .pill-group { display: flex; flex-wrap: wrap; gap: 6px; }
        .pill-label { position: relative; display: inline-flex; align-items: center; cursor: pointer; }
        .pill-label input[type="checkbox"], .pill-label input[type="radio"] {
            appearance: none; -webkit-appearance: none; position: absolute;
            width: 0; height: 0; opacity: 0; margin: 0; padding: 0; border: 0; pointer-events: none;
        }
        .pill-text {
            display: inline-block;
            background: var(--input-bg);
            color: var(--text-muted);
            padding: 5px 10px;
            border-radius: 100px;
            font-size: 0.78rem;
            cursor: pointer;
            border: 1px solid var(--border-color);
        }
        .pill-label input:checked + .pill-text {
            background: rgba(168, 85, 247, 0.18);
            color: #d8b4fe;
            border-color: #a855f7;
        }
        .switch { position: relative; display: inline-block; width: 38px; height: 19px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background: #27272a; transition: .3s; border-radius: 19px;
        }
        .slider:before {
            position: absolute; content: ""; height: 13px; width: 13px;
            left: 3px; bottom: 3px; background: #a1a1aa; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background: var(--primary-color); }
        input:checked + .slider:before { transform: translateX(19px); background: #fff; }
        .hidden-adder { display: none; gap: 6px; margin-top: 6px; }
        .hidden-adder.active { display: flex; }
        .preview-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .preview-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 1px;
        }
        .output-tabs { display: flex; gap: 4px; margin-bottom: 0; }
        .out-tab-btn {
            padding: 4px 10px;
            font-size: 0.7rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: var(--card-bg);
            color: var(--text-muted);
            cursor: pointer;
        }
        .out-tab-btn.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }
        .copy-btn {
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.2s;
        }
        .copy-btn:hover { border-color: #52525b; }
        #preview-content {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            background: #0c0c0e;
            min-height: 0;
            max-height: 50vh;
        }
        pre {
            margin: 0;
            font-family: "Menlo", "Cascadia Code", monospace;
            font-size: 0.7rem;
            color: #a6accd;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .reverse-box {
            padding: 12px 16px;
            font-size: 0.65rem;
            color: #71717a;
            border-top: 1px solid var(--border-color);
            background: #0a0a0c;
            line-height: 1.5;
            max-height: 80px;
            overflow-y: auto;
        }
        .panel-wechat {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding-top: 8px;
            margin-top: 8px;
            border-top: 1px solid var(--border-color);
        }
        .wechat-btn { background: rgba(16,185,129,0.1); color: var(--success-color); border-color: rgba(16,185,129,0.2); }
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary-color);
            color: #fff;
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 0.82rem;
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }

        /* Storyboard */
        .sb-drop-zone {
            border: 2px dashed var(--border-color);
            border-radius: var(--radius-md);
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .sb-drop-zone:hover { border-color: #52525b; }
        .sb-preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }

        /* Collections */
        .collection-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.78rem;
            gap: 8px;
        }
        .collection-item span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .collection-item button {
            padding: 3px 8px;
            font-size: 0.65rem;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            background: var(--input-bg);
            color: var(--text-muted);
            margin-left: 4px;
        }
        .collection-item button:hover { background: var(--primary-color); color: #fff; }

        /* Dec decompile textarea */
        .dec-output {
            width: 100%;
            min-height: 120px;
            background: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 10px;
            font-family: "Menlo", monospace;
            font-size: 0.7rem;
            resize: vertical;
            margin-top: 8px;
        }
        textarea.card-input {
            background: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            font-size: 0.82rem;
            width: 100%;
            resize: vertical;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">ProPrompt · AI 提示词生成器</div>
        <div class="subtitle">小白零门槛，一键搞定提示词!</div>
    </header>

    <div class="weather-bar" id="weatherBar"></div>

    <main>
        <div id="left-panel">
            <div class="tab-bar" id="tabBar"></div>
            <div id="tabContent">
                <div id="dynamicPanels"></div>
                <!-- Storyboard Panel -->
                <div class="tab-panel" id="tab-storyboard">
                    <div class="section-title">🎬 分镜制作</div>
                    <div class="grid-container">
                        <div class="card" style="grid-column: span 2;">
                            <div class="card-title-group">
                                <span class="card-label">参考图片</span>
                                <p class="card-description">拖拽或点击上传参考图片</p>
                            </div>
                            <div class="sb-drop-zone" id="sbDropZone" onclick="document.getElementById('sbFileInput').click()">
                                📁 点击或拖拽图片到此处
                            </div>
                            <input type="file" id="sbFileInput" multiple accept="image/*" style="display:none" onchange="handleSbFiles(this.files)">
                            <div class="sb-preview" id="sbPreview"></div>
                        </div>
                        <div class="card" style="grid-column: span 2;">
                            <div class="card-title-group">
                                <span class="card-label">基础提示词</span>
                            </div>
                            <textarea class="card-input" id="storyboardPrompt" placeholder="描述你需要实现的效果" style="min-height:80px">专业室内设计摄影</textarea>
                        </div>
                    </div>
                    <div style="margin-top:12px">
                        <button class="copy-btn" style="background:var(--primary-color);color:#fff;padding:10px 24px;font-size:0.85rem" onclick="generateStoryboard()">生成分镜提示词 & 打开豆包</button>
                    </div>
                </div>

                <!-- Doubao Decompile Panel -->
                <div class="tab-panel" id="tab-doubao">
                    <div class="section-title">🔍 豆包指令反解</div>
                    <div class="grid-container">
                        <div class="card" style="grid-column: span 2;">
                            <div class="card-title-group">
                                <span class="card-label">豆包分析指令</span>
                                <p class="card-description">粘贴豆包/其他AI生成的参考参数，自动反解出JSON模板</p>
                            </div>
                            <textarea class="card-input" id="doubaoPrompt" placeholder="粘贴豆包或其他AI生成的参数..." style="min-height:100px"></textarea>
                        </div>
                    </div>
                    <textarea class="dec-output" id="decTemplateOutput" placeholder="点击下方按钮生成JSON提示词模板">点击下方按钮生成JSON提示词模板</textarea>
                    <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
                        <button class="copy-btn" style="background:var(--primary-color);color:#fff" onclick="decGenerateTemplate()">生成JSON模板</button>
                        <button class="copy-btn" onclick="decCopyTemplate()">复制模板</button>
                        <button class="copy-btn" style="background:var(--success-color);color:#fff" onclick="decCopyAndOpen()">复制并打开豆包</button>
                    </div>
                </div>

                <!-- Collections Panel -->
                <div class="tab-panel" id="tab-collections">
                    <div class="section-title">📁 收藏管理</div>
                    <div id="collectionList"></div>
                </div>
            </div>
        </div>

        <div id="right-panel">
            <div class="preview-header">
                <div class="preview-title">📋 JSON 提示词</div>
                <div class="output-tabs">
                    <button class="out-tab-btn active" onclick="switchOutputTab('json')">JSON</button>
                    <button class="out-tab-btn" onclick="switchOutputTab('text')">文本</button>
                </div>
            </div>
            <div id="preview-content">
                <pre id="json-preview">{}</pre>
                <pre id="text-preview" style="display:none;"></pre>
            </div>
            <div class="reverse-box" id="reversePrompt"></div>
            <div class="preview-header" style="border-top:1px solid var(--border-color); border-bottom:none;">
                <div style="display:flex;gap:6px;flex-wrap:wrap;">
                    <button class="copy-btn" onclick="copyOutput()">复制当前</button>
                    <button class="copy-btn" onclick="saveToCollection()">保存收藏</button>
                </div>
            </div>
        </div>
    </main>

    <div class="toast" id="toast"></div>

<script>
// ==================== GLOBAL STATE ====================

let formSchema = null;
let currentData = {};
let currentOutputMode = 'json';
let currentConfigPath = 'config.json';
let currentWeather = 'sunny';

// Weather / multi-config support
const weatherConfig = {
    sunny: { prompt: "晴天，明亮的阳光，清晰的天空，柔和的自然光，高质量细节", config: "config.json" },
    cloudy: { prompt: "阴天，柔和的散射光，平静的氛围，细节清晰，高画质", config: "config.json" },
    rainy: { prompt: "雨天，湿润的地面，雨滴效果，朦胧氛围，电影级质感", config: "config.json" }
};

let collections = [];
try { collections = JSON.parse(localStorage.getItem('proprompt_collections') || '[]'); } catch(e) { collections = []; }

// ==================== HELPERS ====================
function escapeHtml(s) { return String(s).replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>'); }
function escapeAttr(s) { return String(s).replace(/&/g,'&').replace(/"/g,'"'); }
function getFieldByKey(fk) {
    if (!formSchema) return null;
    for (const sk in formSchema) {
        const sec = formSchema[sk];
        if (sec.fields && sec.fields[fk]) return sec.fields[fk];
    }
    return null;
}
function normOptionItem(raw) {
    if (typeof raw === 'string') return { value: raw, label: raw };
    if (typeof raw === 'object') return { value: String(raw.value), label: String(raw.label) };
    return null;
}
function flatOptionValues(field) {
    return (field.options || []).map(i => normOptionItem(i)?.value).filter(Boolean);
}
function labelForOptionValue(field, v) {
    if (!field || !field.options) return v;
    const list = Array.isArray(field.options) ? field.options : Object.values(field.options).flat();
    const item = list.find(i => normOptionItem(i).value === v);
    return item ? normOptionItem(item).label : v;
}
function pickInitialValue(field) {
    if (field.type === 'switch') return !!field.default;
    if (field.type === 'multi-select') return Array.isArray(field.default) ? field.default : [];
    if (field.type === 'select' || field.type === 'button-select') {
        const opts = flatOptionValues(field);
        return opts.includes(field.default) ? field.default : opts[0] || '';
    }
    if (field.type === 'text') return String(field.default || '');
    return '';
}
function valTagText(field, v) {
    if (field.type === 'switch') return v ? '开' : '关';
    if (field.type === 'multi-select') return v.map(x => labelForOptionValue(field,x)).join(' · ') || '未选';
    if (field.type === 'select' || field.type === 'button-select') return labelForOptionValue(field,v) || '未选';
    return v || '未填';
}

// ==================== TOAST ====================
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._tid);
    t._tid = setTimeout(() => t.classList.remove('show'), 2000);
}

// ==================== OUTPUT SWITCH ====================
function switchOutputTab(mode) {
    currentOutputMode = mode;
    document.getElementById('json-preview').style.display = mode === 'json' ? 'block' : 'none';
    document.getElementById('text-preview').style.display = mode === 'text' ? 'block' : 'none';
    document.querySelectorAll('.out-tab-btn').forEach(b => {
        b.classList.toggle('active', b.textContent === (mode === 'json' ? 'JSON' : '文本'));
    });
}

// ==================== JSON PREVIEW ====================
function splitBoolFieldKeyToJsonPair(fk) {
    const i = Math.max(fk.indexOf(':'), fk.indexOf('：'));
    if (i < 0) return null;
    return { jsonKey: fk.slice(0, i).trim(), jsonVal: fk.slice(i + 1).trim() };
}

function buildNestedOutput() {
    const nested = {};
    if (formSchema) {
        for (const sk in formSchema) {
            if (sk === '分镜制作') continue;
            nested[sk] = {};
            const fields = formSchema[sk].fields;
            for (const fk in fields) {
                const field = fields[fk];
                const val = currentData[fk];
                if (field.type === 'switch') {
                    if (!val) continue;
                    const p = splitBoolFieldKeyToJsonPair(fk);
                    if (p) nested[sk][p.jsonKey] = p.jsonVal;
                    else nested[sk][fk] = true;
                } else {
                    nested[sk][fk] = val;
                }
            }
        }
    }
    return nested;
}

function buildTextOutput() {
    const out = buildNestedOutput();
    const lines = [];
    for (const sk in out) {
        lines.push('【' + sk + '】');
        for (const k in out[sk]) {
            lines.push('  ' + k + ': ' + out[sk][k]);
        }
        lines.push('');
    }
    return lines.join('\n');
}

function buildReversePrompt() {
    return [
        '禁止出现水印、logo、二维码、文字、拼写错误。',
        '避免模糊、比例拉伸、结构变形。',
        '确保物体、材质、光影一致。',
        '防止涂抹感、元素缺失、过度美化。'
    ].join('\n');
}

function updatePreview() {
    const jsonOut = buildNestedOutput();
    document.getElementById('json-preview').textContent = JSON.stringify(jsonOut, null, 2);
    document.getElementById('text-preview').textContent = buildTextOutput();
    document.getElementById('reversePrompt').textContent = buildReversePrompt();
}

// ==================== DATA UPDATES ====================
function updateData(key, val) {
    currentData[key] = val;
    const tag = document.getElementById('val-' + key);
    const field = getFieldByKey(key);
    if (tag && field) {
        tag.textContent = valTagText(field, val);
        tag.classList.toggle('empty', val === false || (Array.isArray(val) ? val.length === 0 : val === ''));
    }
    // If this field has dependents, rebuild the current tab
    if (field && field.type === 'switch') {
        rebuildCurrentTab();
    }
    updatePreview();
}

function updateMultiData(key, val, checked) {
    if (checked) currentData[key].push(val);
    else currentData[key] = currentData[key].filter(x => x !== val);
    const tag = document.getElementById('val-' + key);
    const field = getFieldByKey(key);
    if (tag && field) {
        tag.textContent = currentData[key].length ? currentData[key].map(x => labelForOptionValue(field,x)).join(' · ') : '未选';
        tag.classList.toggle('empty', !currentData[key].length);
    }
    updatePreview();
}

function handleSelectChange(key, val) {
    if (val === '__ADD_NEW__') {
        document.getElementById('adder-' + key).classList.add('active');
    } else {
        document.getElementById('adder-' + key).classList.remove('active');
        updateData(key, val);
    }
}

function toggleAdder(key) { document.getElementById('adder-' + key).classList.toggle('active'); }

function saveCustomItem(key, type) {
    const v = document.getElementById('input-' + key).value.trim();
    if (!v) return;
    if (type === 'select') {
        const sel = document.getElementById('select-' + key);
        sel.add(new Option(v, v), sel.options[sel.options.length - 1]);
        sel.value = v;
        updateData(key, v);
    } else if (type === 'button-select') {
        const pg = document.getElementById('pills-' + key);
        const name = pg.querySelector('input[type="radio"]').name;
        const label = document.createElement('label');
        label.className = 'pill-label';
        label.innerHTML = '<input type="radio" name="' + name + '" value="' + escapeAttr(v) + '" checked onchange="updateData(\'' + key + '\',this.value)"><span class="pill-text">' + escapeHtml(v) + '</span>';
        pg.insertBefore(label, pg.lastElementChild);
        updateData(key, v);
    } else {
        const pg = document.getElementById('pills-' + key);
        const label = document.createElement('label');
        label.className = 'pill-label';
        label.innerHTML = '<input type="checkbox" value="' + escapeAttr(v) + '" checked onchange="updateMultiData(\'' + key + '\',this.value,this.checked)"><span class="pill-text">' + escapeHtml(v) + '</span>';
        pg.insertBefore(label, pg.lastElementChild);
        updateMultiData(key, v, true);
    }
    document.getElementById('input-' + key).value = '';
    document.getElementById('adder-' + key).classList.remove('active');
}

// ==================== BUILD FORM FROM SCHEMA ====================
function buildTabs(schema) {
    const tabBar = document.getElementById('tabBar');
    const content = document.getElementById('tabContent');
    tabBar.innerHTML = '';

    // Static tabs (storyboard, doubao, collections, and maybe merge with dynamic manually)
    const allTabIds = [];
    let first = true;
    for (const sk in schema) {
        if (sk === '分镜制作') continue;
        const section = schema[sk];
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (first ? ' active' : '');
        btn.textContent = (section.icon || '') + ' ' + sk;
        btn.dataset.tab = 'tab-' + sk;
        btn.onclick = () => switchTab('tab-' + sk);
        tabBar.appendChild(btn);
        allTabIds.push('tab-' + sk);
        first = false;

        // Panel
        let panel = content.querySelector('#tab-' + sk);
        if (!panel) {
            panel = document.createElement('div');
            panel.className = 'tab-panel';
            panel.id = 'tab-' + sk;
            content.appendChild(panel);
        }
        panel.innerHTML = '<div class="section-title"><span>' + (section.icon || '📌') + '</span> ' + escapeHtml(section.title) + '</div>';
        panel.classList.toggle('active', allTabIds.length === 1);
        const grid = document.createElement('div');
        grid.className = 'grid-container';
        buildSectionFields(section, grid);
        panel.appendChild(grid);
    }

    // Storyboard tab button
    const sbBtn = document.createElement('button');
    sbBtn.className = 'tab-btn';
    sbBtn.textContent = schema['分镜制作'] ? '🎬 分镜助手' : '🎬 分镜';
    sbBtn.dataset.tab = 'tab-storyboard';
    sbBtn.onclick = () => switchTab('tab-storyboard');
    tabBar.appendChild(sbBtn);
    allTabIds.push('tab-storyboard');

    // Doubao tab button
    const dbBtn = document.createElement('button');
    dbBtn.className = 'tab-btn';
    dbBtn.textContent = '🔍 豆包反解';
    dbBtn.dataset.tab = 'tab-doubao';
    dbBtn.onclick = () => switchTab('tab-doubao');
    tabBar.appendChild(dbBtn);
    allTabIds.push('tab-doubao');

    // Collections tab button
    const colBtn = document.createElement('button');
    colBtn.className = 'tab-btn';
    colBtn.textContent = '📁 收藏';
    colBtn.dataset.tab = 'tab-collections';
    colBtn.onclick = () => switchTab('tab-collections');
    tabBar.appendChild(colBtn);
    allTabIds.push('tab-collections');

    // Ensure first tab is active
    switchTab(allTabIds[0]);
}

function buildSectionFields(section, grid) {
    const fields = section.fields;
    for (const fk in fields) {
        const field = fields[fk];
        if (field.depends && !currentData[field.depends]) continue;
        const card = document.createElement('div');
        card.className = 'card';
        const iv = pickInitialValue(field);
        currentData[fk] = iv;
        const tagShow = valTagText(field, iv);
        const tagClass = (iv === false || (Array.isArray(iv) && iv.length === 0) || iv === '')
            ? 'selected-value empty' : 'selected-value';

        let inner = '<div class="card-header">';
        inner += '<div class="card-title-group">';
        inner += '<span class="card-label">' + escapeHtml(field.label || fk) + '</span>';
        if (field.description) inner += '<p class="card-description">' + escapeHtml(field.description) + '</p>';
        inner += '<span id="val-' + fk + '" class="' + tagClass + '">' + tagShow + '</span>';
        inner += '</div>';

        if (field.type === 'switch') {
            inner += '<label class="switch"><input type="checkbox"' + (iv ? ' checked' : '') + ' onchange="updateData(\'' + fk + '\',this.checked)"><span class="slider"></span></label>';
            inner += '</div>';
        } else {
            inner += '</div><div>';
            if (field.type === 'text') {
                inner += '<input type="text" value="' + escapeAttr(iv) + '" oninput="updateData(\'' + fk + '\',this.value)">';
            } else if (field.type === 'select') {
                inner += '<select id="select-' + fk + '" onchange="handleSelectChange(\'' + fk + '\',this.value)">';
                (field.options || []).forEach(opt => {
                    const n = normOptionItem(opt);
                    inner += '<option value="' + escapeAttr(n.value) + '"' + (n.value === iv ? ' selected' : '') + '>' + escapeHtml(n.label) + '</option>';
                });
                inner += '<option value="__ADD_NEW__">➕ 自定义</option></select>';
            } else if (field.type === 'multi-select') {
                inner += '<div class="pill-group" id="pills-' + fk + '">';
                (field.options || []).forEach(opt => {
                    const n = normOptionItem(opt);
                    const checked = iv.includes(n.value) ? ' checked' : '';
                    inner += '<label class="pill-label"><input type="checkbox" value="' + escapeAttr(n.value) + '"' + checked + ' onchange="updateMultiData(\'' + fk + '\',this.value,this.checked)"><span class="pill-text">' + escapeHtml(n.label) + '</span></label>';
                });
                inner += '<div class="pill-text" style="border-style:dashed" onclick="toggleAdder(\'' + fk + '\')">+ 自定义</div></div>';
            } else if (field.type === 'button-select') {
                const name = 'radio-' + fk;
                inner += '<div class="pill-group" id="pills-' + fk + '">';
                (field.options || []).forEach(opt => {
                    const n = normOptionItem(opt);
                    inner += '<label class="pill-label"><input type="radio" name="' + name + '" value="' + escapeAttr(n.value) + '"' + (n.value === iv ? ' checked' : '') + ' onchange="updateData(\'' + fk + '\',this.value)"><span class="pill-text">' + escapeHtml(n.label) + '</span></label>';
                });
                inner += '<div class="pill-text" style="border-style:dashed" onclick="toggleAdder(\'' + fk + '\')">+ 自定义</div></div>';
            }
            inner += '<div id="adder-' + fk + '" class="hidden-adder"><input type="text" id="input-' + fk + '" placeholder="输入新值"><button class="copy-btn" style="background:var(--primary-color);color:#fff" onclick="saveCustomItem(\'' + fk + '\',\'' + field.type + '\')">确定</button></div>';
            inner += '</div>';
        }
        card.innerHTML = inner;
        grid.appendChild(card);
    }
}

function switchTab(tabId) {
    document.querySelectorAll('#tabBar .tab-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === tabId);
    });
    document.querySelectorAll('#tabContent .tab-panel').forEach(p => {
        p.classList.toggle('active', p.id === tabId);
    });
}

function rebuildCurrentTab() {
    const activeTab = document.querySelector('#tabBar .tab-btn.active');
    if (!activeTab) return;
    const tabId = activeTab.dataset.tab;
    const panel = document.getElementById(tabId);
    if (!panel) return;
    const sectionKey = tabId.replace('tab-', '');
    const section = formSchema[sectionKey];
    if (!section) return;
    const grid = panel.querySelector('.grid-container');
    if (grid) {
        grid.innerHTML = '';
        buildSectionFields(section, grid);
    }
}

// ==================== WEATHER ====================
function initWeatherButtons() {
    const bar = document.getElementById('weatherBar');
    if (!bar) return;
    bar.innerHTML = '';
    for (const key in weatherConfig) {
        const btn = document.createElement('button');
        btn.className = 'weather-btn' + (key === currentWeather ? ' active' : '') + (weatherConfig[key].isCustom ? ' custom' : '');
        btn.dataset.type = key;
        btn.textContent = weatherConfig[key].prompt.substring(0, 4) || key;
        btn.onclick = () => {
            currentWeather = key;
            currentConfigPath = weatherConfig[key].config;
            document.querySelectorAll('.weather-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadConfig();
        };
        bar.appendChild(btn);
    }
}

// ==================== LOAD CONFIG ====================
async function loadConfig() {
    const candidates = [currentConfigPath];
    if (window.location.protocol === 'file:') {
        candidates.push('https://yiyuqiao2748.github.io/prompt-studio/' + currentConfigPath);
    }

    let response = null;
    let lastError = null;
    for (const path of candidates) {
        try {
            response = await fetch(path);
            if (!response.ok) throw new Error('配置文件加载失败');
            break;
        } catch (e) {
            lastError = e;
        }
    }

    try {
        if (!response) throw lastError || new Error('配置文件加载失败');
        formSchema = await response.json();
        currentData = {};
        document.getElementById('tabBar').innerHTML = '';
        // Preserve special panels, remove dynamic panels
        const content = document.getElementById('tabContent');
        const allPanels = content.querySelectorAll('.tab-panel');
        const keepIds = ['tab-storyboard', 'tab-doubao', 'tab-collections'];
        allPanels.forEach(p => {
            if (!keepIds.includes(p.id)) p.remove();
        });
        buildTabs(formSchema);
        updatePreview();
    } catch (e) {
        document.getElementById('tabContent').innerHTML = '<div style="color:#ef4444;text-align:center;padding:24px">加载失败: ' + escapeHtml(e.message) + '</div>';
    }
}

// ==================== COPY ====================
function copyOutput() {
    const text = currentOutputMode === 'json'
        ? document.getElementById('json-preview').textContent
        : document.getElementById('text-preview').textContent;
    if (!text || text === '{}') { showToast('无内容可复制'); return; }
    if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => showToast('✅ 已复制'));
    } else {
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); ta.remove();
        showToast('✅ 已复制');
    }
}

// ==================== COLLECTION ====================
function saveToCollection() {
    const item = {
        time: new Date().toLocaleString(),
        json: buildNestedOutput(),
        text: buildTextOutput()
    };
    collections.unshift(item);
    if (collections.length > 50) collections = collections.slice(0, 50);
    localStorage.setItem('proprompt_collections', JSON.stringify(collections));
    renderCollections();
    showToast('已保存到收藏');
}

function renderCollections() {
    const container = document.getElementById('collectionList');
    if (!container) return;
    if (!collections.length) {
        container.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:24px;font-size:0.82rem;">暂无收藏</div>';
        return;
    }
    container.innerHTML = '';
    collections.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'collection-item';
        const preview = (item.text || '').split('\n')[0] || '(空)';
        div.innerHTML = '<span>' + escapeHtml(item.time) + ' - ' + escapeHtml(preview.substring(0, 40)) + '</span><div><button onclick="loadCollection(' + i + ')">加载</button><button onclick="deleteCollection(' + i + ')">删除</button></div>';
        container.appendChild(div);
    });
}

function loadCollection(i) {
    const item = collections[i];
    if (item.json) {
        document.getElementById('json-preview').textContent = JSON.stringify(item.json, null, 2);
        document.getElementById('text-preview').textContent = item.text || '';
        document.getElementById('reversePrompt').textContent = buildReversePrompt();
        showToast('已加载收藏项');
    }
}

function deleteCollection(i) {
    collections.splice(i, 1);
    localStorage.setItem('proprompt_collections', JSON.stringify(collections));
    renderCollections();
    showToast('已删除');
}

// ==================== STORYBOARD ====================
let sbImages = [];
function handleSbFiles(files) {
    sbImages = Array.from(files);
    renderSbPreview();
}
function renderSbPreview() {
    const container = document.getElementById('sbPreview');
    const dz = document.getElementById('sbDropZone');
    container.innerHTML = '';
    sbImages.forEach((file, i) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = document.createElement('div');
            img.style.cssText = 'width:56px;height:56px;border-radius:6px;background:url(' + ev.target.result + ') center/cover;border:1px solid var(--border-color);position:relative';
            img.innerHTML = '<span style="position:absolute;top:-4px;right:-4px;background:var(--primary-color);color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700">' + (i+1) + '</span>';
            container.appendChild(img);
        };
        reader.readAsDataURL(file);
    });
    if (sbImages.length) {
        dz.innerHTML = '<div style="font-size:1.1em">✅ ' + sbImages.length + ' 张图片已选择</div><div style="color:var(--text-muted);font-size:0.75rem">点击重新选择</div>';
    }
}
function generateStoryboard() {
    if (!sbImages.length) { showToast('请先上传参考图片'); return; }
    const basePrompt = document.getElementById('storyboardPrompt').value.trim() || '专业室内设计摄影';
    let prompt = '# 分镜提示词生成任务\n\n';
    prompt += '你是一个专业的AI空间摄影师和提示词工程师。我现在为你提供了 ' + sbImages.length + ' 张参考图片，请按照以下要求，为每一张图片生成对应的分镜提示词。\n\n';
    prompt += '## 对每张图片的分析要求\n';
    prompt += '请仔细观察每张图片，分析以下内容并生成对应的分镜提示词：\n\n';
    prompt += '1. **空间描述**：图片展示的是什么空间/场景？主要元素有哪些？\n';
    prompt += '2. **构图角度**：从什么角度拍摄的？建议用什么角度表现？\n';
    prompt += '3. **光影分析**：图片中的光线方向、色温、明暗对比如何？\n';
    prompt += '4. **材质细节**：有哪些关键材质？纹理和质感如何？\n';
    prompt += '5. **色彩氛围**：整体色调是什么？营造了什么氛围？\n';
    prompt += '6. **重点表现**：这一帧应该重点展示什么？\n\n';
    prompt += '## 输出格式（请严格按以下格式为每帧生成）\n\n';
    for (let f = 1; f <= sbImages.length; f++) {
        prompt += '### 【第 ' + f + ' 格】📷 基于参考图\n';
        prompt += '**分析说明**：（简要描述图片内容和你的分析）\n\n';
        prompt += '**分镜提示词：**\n' + basePrompt + '，[此处根据图片分析写入详细的场景、构图、光影、材质、色彩描述]。重点表现[根据图片确定的重点]。\n\n';
        prompt += '**反向提示词：**\n禁止出现水印、logo、二维码、文字、拼写错误。避免模糊、比例拉伸、结构变形。确保物体、材质、光影一致。防止涂抹感、元素缺失、过度美化。\n\n';
    }
    prompt += '## 强制统一约束（适用于所有帧）\n';
    prompt += '- 100%保持原图比例、结构、主体不变\n';
    prompt += '- 营造前景深效果，增强层次感和立体感\n';
    prompt += '- 保持画面自然和谐，避免过度处理\n\n';
    prompt += '请开始分析图片并生成所有 ' + sbImages.length + ' 帧的分镜提示词。';
    document.getElementById('text-preview').textContent = prompt;
    switchOutputTab('text');
    if (navigator.clipboard) {
        navigator.clipboard.writeText(prompt).then(() => showToast('提示词已复制，正在打开豆包...'));
    }
    window.open('https://www.doubao.com/chat/', '_blank');
}
// Drop zone events
document.addEventListener('DOMContentLoaded', () => {
    const dz = document.getElementById('sbDropZone');
    if (dz) {
        dz.addEventListener('dragover', e => { e.preventDefault(); dz.style.borderColor = 'var(--primary-color)'; });
        dz.addEventListener('dragleave', e => { dz.style.borderColor = 'var(--border-color)'; });
        dz.addEventListener('drop', e => {
            e.preventDefault(); dz.style.borderColor = 'var(--border-color)';
            sbImages = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
            renderSbPreview();
        });
    }
});

// ==================== DOUBAO DECOMPILE ====================
function decGenerateTemplate() {
    const doubaoPrompt = document.getElementById('doubaoPrompt').value.trim();
    const template = buildNestedOutput();
    // Inject doubao analysis instruction if provided
    if (doubaoPrompt) template['豆包分析指令'] = doubaoPrompt;
    const jsonStr = JSON.stringify(template, null, 2);
    document.getElementById('decTemplateOutput').value = jsonStr + '\n\n// 帮我写提示词，用于AI室内设计渲染，要json格式';
    showToast('JSON模板已生成');
}
function decCopyTemplate() {
    const text = document.getElementById('decTemplateOutput').value;
    if (!text || text.includes('生成JSON提示词模板')) { showToast('请先点击生成JSON模板'); return; }
    if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => showToast('模板已复制到剪贴板'));
    } else {
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); ta.remove();
        showToast('模板已复制到剪贴板');
    }
}
function decCopyAndOpen() {
    const text = document.getElementById('decTemplateOutput').value;
    if (!text || text.includes('生成JSON提示词模板')) { showToast('请先点击生成JSON模板'); return; }
    if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
            window.open('https://www.doubao.com/chat/', '_blank');
            showToast('已复制并打开豆包');
        });
    } else {
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); ta.remove();
        window.open('https://www.doubao.com/chat/', '_blank');
        showToast('已复制并打开豆包');
    }
}

// ==================== INIT ====================
window.onload = () => {
    initWeatherButtons();
    loadConfig();
    switchOutputTab('json');
    renderCollections();
};
